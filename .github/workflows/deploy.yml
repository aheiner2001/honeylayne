name: Deploy Honey Layne to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # base-href must match the repo name so assets load on the project page.
      - run: flutter build web --release --no-tree-shake-icons --base-href "/honeylayne/"

      # GitHub Pages has no path rewrites, so serve the app for unknown paths
      # (e.g. /manage) by using it as the 404 fallback.
      - run: cp build/web/index.html build/web/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
