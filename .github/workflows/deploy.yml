name: Deploy Honey Layne to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Build secrets in from GitHub repo Secrets (Settings > Secrets and
      # variables > Actions). Nothing sensitive lives in the source tree.
      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          MANAGER_PASSWORD=${{ secrets.MANAGER_PASSWORD }}
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EOF

      # Served at the apex custom domain (honeylayne.shop), so base-href is "/".
      # (If you ever drop the custom domain and use aheiner2001.github.io/honeylayne/,
      # change this back to "/honeylayne/".)
      - run: flutter build web --release --no-tree-shake-icons --base-href "/" --dart-define-from-file=.env

      # GitHub Pages has no path rewrites, so serve the app for unknown paths
      # (e.g. /manage) by using it as the 404 fallback.
      - run: cp build/web/index.html build/web/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
