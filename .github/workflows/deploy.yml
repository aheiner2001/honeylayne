name: Deploy Honey Layne to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build secrets in from GitHub repo Secrets (Settings > Secrets and
      # variables > Actions). Nothing sensitive lives in the source tree.
      # Vite only exposes variables prefixed with VITE_ to the bundle.
      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          VITE_MANAGER_PASSWORD=${{ secrets.MANAGER_PASSWORD }}
          VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EOF

      # Served at the apex custom domain (honeylayne.shop), so base is "/".
      # (If you ever drop the custom domain and use aheiner2001.github.io/honeylayne/,
      # set "base" in vite.config.ts to "/honeylayne/".)
      - run: npm run build

      # GitHub Pages has no path rewrites, so serve the app for unknown paths
      # (e.g. /manage) by using it as the 404 fallback.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
